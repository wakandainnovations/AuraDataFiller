table.name=movies_data_collection

# Fuzzy duplicate detection thresholds (pg_trgm similarity, 0.0-1.0)
# Incoming names >= automerge threshold are silently merged into the existing canonical name.
# Names between warn and automerge thresholds are logged as potential duplicates but inserted as-is.
fuzzy.automerge.threshold=0.93
fuzzy.warn.threshold=0.75
# Skip fuzzy check entirely when unique pairs exceed this count (too slow for very large datasets)
fuzzy.max.pairs=50000

# External enrichment (GDP, inflation, events)
# Set enrichment.enabled=true to activate.
# Free APIs used:
#   - World Bank (no auth, no cost) for GDP and annual inflation
#   - Anthropic Claude Haiku (requires key in secrets.properties) for event detection
enrichment.enabled=true
enrichment.worldbank.enabled=true
enrichment.claude.enabled=false
# Delay in milliseconds between successive Claude API calls (avoids rate-limit 429s).
enrichment.api.delay.ms=300

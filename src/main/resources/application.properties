table.name=movies_data_collection

# Fuzzy duplicate detection thresholds (pg_trgm similarity, 0.0-1.0)
# Incoming names >= automerge threshold are silently merged into the existing canonical name.
# Names between warn and automerge thresholds are logged as potential duplicates but inserted as-is.
fuzzy.automerge.threshold=0.93
fuzzy.warn.threshold=0.75
# Skip fuzzy check entirely when unique pairs exceed this count (too slow for very large datasets)
fuzzy.max.pairs=50000

# External enrichment (GDP, inflation, events)
# Set enrichment.enabled=true to activate.
# Free APIs used:
#   - World Bank (no auth, no cost) for GDP and annual inflation
#   - Anthropic Claude Haiku (requires key in secrets.properties) for event detection
enrichment.enabled=true
enrichment.worldbank.enabled=true
enrichment.claude.enabled=false
# Delay in milliseconds between successive Claude API calls (avoids rate-limit 429s).
enrichment.api.delay.ms=300

# ---- Sacnilk box-office crawler (background daemon; --watch / --batch modes) ----
# Set to false to disable the background crawler entirely.
crawler.enabled=true
# How long (ms) to wait after app startup before the first crawl begins.
# Gives the CSV-import path time to initialise first.
crawler.initial.delay.ms=10000
# Minimum delay (ms) between successive HTTP requests to sacnilk.com.
# robots.txt specifies Crawl-delay: 1 second; 1 500 ms provides a comfortable margin.
crawler.request.delay.ms=1500
# How many hours to sleep between full crawl cycles (default: every 24 hours).
crawler.interval.hours=24
# Levenshtein-ratio threshold (0.0-1.0) for matching movie names to DB entries.
# Shared by all crawler sources. Recommended range: 0.65-0.85.
crawler.match.threshold=0.70

# ---- Box Office Mojo gap-fill crawler (--crawl and --watch/--batch daemon modes) ----
# Set to false to skip the BOM phase entirely.
crawler.bom.enabled=true
# Minimum delay (ms) between successive HTTP requests to boxofficemojo.com.
# No Crawl-delay specified in robots.txt; 2 000 ms used as a polite default.
crawler.bom.delay.ms=2000

# ---- Koimoi gap-fill crawler (--crawl and --watch/--batch daemon modes) ----
# Set to false to skip the Koimoi phase entirely.
crawler.koimoi.enabled=true
# Minimum delay (ms) between successive HTTP requests to koimoi.com.
# No Crawl-delay specified in robots.txt; 2 000 ms used as a polite default.
crawler.koimoi.delay.ms=2000

# Note: imdb.com is intentionally not crawled — its robots.txt disallows automated
# crawlers for all search paths (/search/, /find/) for non-whitelisted user-agents.

# ---- Actor data collection service (background daemon; --watch / --batch modes) ----
# Set to false to disable the background actor collector entirely.
actor.collector.enabled=true
# How long (ms) to wait after app startup before the first scan begins.
actor.collector.initial.delay.ms=15000
# How many hours to sleep between full scan cycles (default: every 24 hours).
actor.collector.interval.hours=24
# Folder containing actor CSV files to scan. Each CSV row is a movie; actor columns
# (Actor 1, Actor 2, Actor 3, etc.) are expanded into one row per actor.
actor.collector.folder=/Users/mukundv/Documents/work/space/actor_data_collection

# ---- Sacnilk actor filmography crawler (parallel daemon inside actor-data-collector) ----
# Set to false to disable crawling sacnilk for actor filmography pages.
actor.crawler.enabled=true
# How long (ms) to wait before the first crawl (longer than CSV scan so data is in DB first).
actor.crawler.initial.delay.ms=30000
# How many hours to sleep between full crawl cycles.
actor.crawler.interval.hours=24
# Levenshtein-ratio threshold for fuzzy-matching DB actor names to sacnilk URL slugs.
actor.crawler.match.threshold=0.75
